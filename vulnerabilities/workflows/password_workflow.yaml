name: password_workflow
description: Vérification de la longueur et de la complexité des mots de passe
steps:
  - module: password_length
    params:
      password: "{{ password_to_test }}"

  - module: password_combination
    params:
      base_password: "{{ password_to_test }}"
      max_length: 12

  - module: password_strength
    params:
      password: "{{ password_to_test }}"

  - module: results_saver
    params:
      vulnerability_type: "password_length_complexity"
      vulnerability_name: "Password length and complexity"
      password_length_score: "{{ password_length_score }}"
      password_combinations: "{{ password_combinations }}"
      password_strength_score: "{{ password_strength_score }}"

params:
  password_to_test: "weak123456!"